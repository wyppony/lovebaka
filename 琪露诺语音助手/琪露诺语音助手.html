        }

        }

            margin-left: auto;

            border-radius: 50%;

            background-position: center;
        }

            justify-content: center;
            color: #fff;
            font-size: 24px;
            font-weight: bold;
        }

            padding: 12px 16px;
            border-radius: 18px;
            line-height: 1.4;
            font-size: 15px;
        }
        .kirino-bubble {
            background-color: #f5f5f5;
            border-bottom-left-radius: 4px;
        }
        .user-bubble {
            background-color: #87ceeb;
            color: #fff;
            border-bottom-right-radius: 4px;
        }
        /* 气泡内链接样式 */
        .msg-bubble a {
            color: #1890ff;
            text-decoration: underline;
        }
        /* 气泡内音频样式 */
        .msg-bubble audio {
            max-width: 100%;
            margin-top: 8px;
        }

            display: flex;
            gap: 10px;
            align-items: center;
            padding: 0 20px 20px 20px;
        }

            flex: 1;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 24px;
            outline: none;
            font-size: 15px;
        }

            width: 48px;
            height: 48px;
            border-radius: 50%;
            background-color: #87ceeb;
            color: #fff;
            border: none;
            cursor: pointer;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #send-btn:hover {
            background-color: #7cb9e8;
        }
        /* 底部提示 */
        .system-tip {
            text-align: center;
            color: #999;
            font-size: 12px;
            margin: 0 20px 10px 20px;
        }
        /* 弹窗遮罩：锁界面 */
        .modal-mask {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background-color: rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 999;
            display: none;

            background-color: #fff;

            color: #fff;

            try {
                const str = localStorage.getItem(CHAT_HISTORY_KEY);
                return str ? JSON.parse(str) : [];
            } catch (e) {
                console.error("读取聊天记录失败:", e);
                return [];
            }
        }
        // 3. 本地存储：保存单条聊天记录
        function saveChatHistory(isKirino, content) {
            const history = getChatHistory();
            history.push({ isKirino, content, time: new Date().getTime() });
            localStorage.setItem(CHAT_HISTORY_KEY, JSON.stringify(history));
        }
        // 4. 本地存储：清空所有聊天记录
        function clearChatHistory() {
            localStorage.removeItem(CHAT_HISTORY_KEY);
            chatContainer.innerHTML = "";
            addMsg(true, DEFAULT_WELCOME, true);
            hideModal();
        }
        // 5. 添加消息到页面
        function addMsg(isKirino, content, isInit = false) {
            const msgItem = document.createElement('div');
            msgItem.className = `msg-item ${isKirino ? 'kirino-msg' : 'user-msg'}`;
            const avatarHtml = isKirino 
                ? `<div class="avatar kirino-avatar" style="background-image: url(${KIRINO_AVATAR})"></div>`
                : `<div class="avatar user-avatar" style="background-color: ${USER_AVATAR_BG}">${USER_AVATAR_TEXT}</div>`;
            const bubbleHtml = `<div class="msg-bubble ${isKirino ? 'kirino-bubble' : 'user-bubble'}">${content}</div>`;
            msgItem.innerHTML = avatarHtml + bubbleHtml;
            chatContainer.appendChild(msgItem);
            chatContainer.scrollTop = chatContainer.scrollHeight;
            if (!isInit) saveChatHistory(isKirino, content);
        }
        // 6. 计算式处理：兼容 1+1、1+1=、1+1=？ 格式
        function formatCalcExpr(msg) {
            return msg.replace(/[=?]/g, '').trim();
        }
        // 7. 十以内加减乘除计算核心
        function calcTen(numExpr) {
            const reg = /^([0-9]{1})[\+\-\*\/]([0-9]{1})$/;
            const pureExpr = formatCalcExpr(numExpr);
            const match = pureExpr.match(reg);
            if (!match) return CALC_OVER_REPLY;
            const [, a, b] = match;
            const n1 = Number(a), n2 = Number(b);
            let res;
            if (pureExpr.includes('+')) res = n1 + n2;
            else if (pureExpr.includes('-')) res = n1 - n2;
            else if (pureExpr.includes('*')) res = n1 * n2;
            else if (pureExpr.includes('/')) {
                if (n2 === 0) return CALC_ZERO_REPLY;
                res = n1 / n2;
            }
            return res !== undefined ? `${pureExpr} = ${res}` : CALC_OVER_REPLY;
        }
        // 8. 获取当前时间
        function getNowTime() {
            const now = new Date();
            const year = now.getFullYear();
            const month = String(now.getMonth() + 1).padStart(2, '0');
            const day = String(now.getDate()).padStart(2, '0');
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            return `${year}年${month}月${day}日 ${h}:${m}:${s}`;
        }
        // 9. 多关键词匹配核心
        function matchMultiKey(msg) {
            const lowerMsg = msg.toLowerCase();
            for (const item of multiKeyWord) {
                const allKeyMatch = item.keys.every(key => lowerMsg.includes(key.toLowerCase()));
                if (allKeyMatch) return item.reply;
            }
            return null;
        }
        // 10. 单关键词匹配核心
        function matchSingleKey(msg) {
            const lowerMsg = msg.toLowerCase();
            for (const [key, reply] of Object.entries(singleKeyWord)) {
                if (lowerMsg.includes(key.toLowerCase())) return reply;
            }
            return null;
        }
        // 11. 帮助功能匹配
        function matchHelp(msg) {
            return msg.trim().toLowerCase() === "帮助" ? HELP_CONTENT : null;
        }
        // 12. URL跳转匹配
        function matchUrl(msg) {
            const urlReg = /^https?:\/\/.+/;
            const trimMsg = msg.trim();
            if (urlReg.test(trimMsg)) {
                return `点击链接跳转：<a href="${trimMsg}" target="_blank">${trimMsg}</a>`;
            }
            return null;
        }
        // 13. 爱⑨之家页面跳转匹配（修复：兼容完整URL和相对路径）
        function matchLovebakaPage(msg) {
            const trimMsg = msg.trim().toLowerCase();
            for (const [pageName, pageUrl] of Object.entries(LOVEBAKA_PAGE_MAP)) {
                if (trimMsg === pageName.toLowerCase()) {
                    // 判断是否为完整URL，是则直接使用，否则拼接主页URL
                    const fullUrl = pageUrl.startsWith('http') ? pageUrl : `${HOME_PAGE_URL}/${pageUrl}`;
                    return `点击跳转爱⑨之家【${pageName}】：<a href="${fullUrl}" target="_blank">${pageName}</a>`;
                }
            }
            return null;
        }
        // 14. 东方角色THBWiki跳转匹配（仅白名单内角色触发）
        function matchThbWiki(msg) {
            const trimMsg = msg.trim();
            const lowerMsg = trimMsg.toLowerCase();
            // 校验是否在角色白名单内（忽略大小写）
            const isTouhouChar = TOUHOU_CHARACTER_LIST.some(char => char.toLowerCase() === lowerMsg);
            if (!isTouhouChar) return null; // 非东方角色，不触发跳转
            // 是东方角色，生成THBWiki链接
            const pageUrl = `${THB_WIKI_BASE_URL}${encodeURIComponent(trimMsg)}`;
            return `点击查看【${trimMsg}】的THBWiki官方资料：<a href="${pageUrl}" target="_blank">${trimMsg} 资料页</a>`;
        }
        // 15. 同人曲播放匹配
        function matchMusic(msg) {
            const musicReg = /^我想听[：:]?\s*(.+)$/;
            const match = msg.trim().match(musicReg);
            if (!match) return null;
            const musicName = match[1].trim();
            const lowerMusicName = musicName.toLowerCase();
            // 匹配歌曲
            for (const [name, url] of Object.entries(CIRNO_MUSIC_MAP)) {
                if (lowerMusicName === name.toLowerCase()) {
                    return `正在播放：${name}<br><audio src="${url}" controls preload="metadata">`;
                }
            }
            return `诶？这首「${musicName}」琪露诺还没有哦～换一首试试吧！`;
        }
        // 16. 消息处理核心逻辑（修复：计算式匹配正则、无匹配回复统一）
        function handleMsg(msg) {
            const rawMsg = msg.trim();
            const lowerMsg = rawMsg.toLowerCase();
            // 优先级1：多关键词匹配
            const multiReply = matchMultiKey(rawMsg);
            if (multiReply) return multiReply;
            // 优先级2：帮助功能
            const helpReply = matchHelp(rawMsg);
            if (helpReply) return helpReply;
            // 优先级3：URL跳转
            const urlReply = matchUrl(rawMsg);
            if (urlReply) return urlReply;
            // 优先级4：同人曲播放
            const musicReply = matchMusic(rawMsg);
            if (musicReply) return musicReply;
            // 优先级5：计算式（修复：正则仅匹配十以内纯加减乘除，避免非计算式误触发）
            if (/^[0-9][\+\-\*\/][0-9][=?]*$/.test(rawMsg.replace(/\s/g, ''))) {
                return calcTen(rawMsg);
            }
            // 优先级6：时间查询
            if (lowerMsg.includes('时间') || lowerMsg.includes('现在几点')) {
                return `现在的时间是：${getNowTime()}`;
            }
            // 优先级7：爱⑨之家页面跳转
            const pageReply = matchLovebakaPage(rawMsg);
            if (pageReply) return pageReply;
            // 优先级8：东方角色THBWiki跳转
            const thbReply = matchThbWiki(rawMsg);
            if (thbReply) return thbReply;
            // 优先级9：预设精准问答
            for (const [q, a] of Object.entries(presetQa)) {
                if (lowerMsg === q.toLowerCase()) return a;
            }
            // 优先级10：单关键词匹配
            const singleReply = matchSingleKey(rawMsg);
            if (singleReply) return singleReply;
            // 优先级11：模糊匹配
            if (lowerMsg.includes('pony社') || lowerMsg.includes('泼尼') || lowerMsg.includes('爱⑨之家') || lowerMsg.includes('9教')) {
                return "爱⑨之家是琪露诺粉丝的专属网站，隶属于泼尼动漫社，快去逛逛吧～<a href='https://wyppony.github.io/lovebaka' target='_blank'>爱⑨之家</a>";
            }
            // 优先级12：无匹配内容（统一使用配置项，避免冲突）
            return NO_MATCH_REPLY;
        }
        // 17. 发送消息核心函数
        function sendMsg() {
            const content = msgInput.value.trim();
            if (!content) return;
            addMsg(false, content);
            msgInput.value = '';
            setTimeout(() => {
                const kirinoContent = handleMsg(content);
                addMsg(true, kirinoContent);
            }, THINK_DELAY);
        }
        // 18. 弹窗操作：显示弹窗（锁界面）
        function showModal() {
            modalMask.style.display = "flex";
            msgInput.disabled = true;
            sendBtn.disabled = true;
            clearAllBtn.disabled = true;
            homeBtn.style.pointerEvents = "none";
        }
        // 19. 弹窗操作：隐藏弹窗（解锁界面）
        function hideModal() {
            modalMask.style.display = "none";
            msgInput.disabled = false;
            sendBtn.disabled = false;
            clearAllBtn.disabled = false;
            homeBtn.style.pointerEvents = "auto";
            msgInput.focus();
        }
        // 20. 绑定所有事件
        function bindEvents() {
            sendBtn.addEventListener('click', sendMsg);
            msgInput.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') sendMsg();
            });
            clearAllBtn.addEventListener('click', showModal);
            modalConfirm.addEventListener('click', clearChatHistory);
            modalCancel.addEventListener('click', hideModal);
        }
    </script>
