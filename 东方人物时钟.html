<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>东方人物时钟</title>
<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}
body{
  background:#fff;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  position:relative;
}

.back-btn{
  position:fixed;
  top:20px;
  left:20px;
  padding:8px 16px;
  background:#f5f5f5;
  border:1px solid #ddd;
  border-radius:8px;
  text-decoration:none;
  color:#333;
  font-size:14px;
  z-index:999;
}
.back-btn:hover{ background:#eee; }

.clock-title{
  font-size:28px;
  margin-bottom:20px;
  color:#333;
  font-weight:bold;
}

.clock{
  display:flex;
  align-items:center;
  gap:max(1vw,8px);
  padding:0 10px;
}
.digit-box{
  position:relative;
  width:max(90px,18vw);
  aspect-ratio:9/16;
}
.digit{
  width:100%;
  height:100%;
  object-fit:cover;
  border:none;
}

.colon-box{
  display:flex;
  flex-direction:column;
  gap:max(0.8vw,4px);
  padding:0 max(0.5vw,4px);
  animation: blink 1s infinite step-end;
}
.colon{
  width:max(24px,4vw);
  aspect-ratio:1/1;
  object-fit:cover;
}
@keyframes blink{
  0%,100%{opacity:1;}
  50%{opacity:0;}
}

.name-tooltip{
  position:absolute;
  bottom:8px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.7);
  color:#fff;
  padding:4px 10px;
  border-radius:6px;
  font-size:14px;
  white-space:nowrap;
  opacity:0;
  pointer-events:none;
  transition:opacity 0.2s;
}
.digit-box:hover .name-tooltip{ opacity:1; }

.center-char{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  height:80vh;
  aspect-ratio:9/16;
  z-index:9999;
  display:none;
}
</style>
</head>

<body>

<a href="https://wyppony.github.io/lovebaka" class="back-btn">← 返回</a>
<h1 class="clock-title">东方人物时钟</h1>

<div class="clock" id="clockNormal">
  <div class="digit-box" id="box1">
    <img id="d1" class="digit">
    <div class="name-tooltip" id="n1"></div>
  </div>
  <div class="digit-box" id="box2">
    <img id="d2" class="digit">
    <div class="name-tooltip" id="n2"></div>
  </div>

  <div class="colon-box" id="colonBox">
    <img class="colon" src="毛玉.jpg">
    <img class="colon" src="毛玉.jpg">
  </div>

  <div class="digit-box" id="box3">
    <img id="d3" class="digit">
    <div class="name-tooltip" id="n3"></div>
  </div>
  <div class="digit-box" id="box4">
    <img id="d4" class="digit">
    <div class="name-tooltip" id="n4"></div>
  </div>
</div>

<img id="centerChar" class="center-char">

<script>
const chara = {
  kosuzu: { img: "立绘/本居小铃.png", name: "本居小铃" },
  zero: { img: "立绘/本居小铃.png", name: "本居小铃" },
  ichirin: { img: "立绘/伊吹萃香.png", name: "伊吹萃香" },
  rumia: { img: "立绘/露米娅.png", name: "露米娅" },
  mamizo: { img: "立绘/二岩猯藏.png", name: "二岩猯藏" },
  keiko: { img: "立绘/三头慧之子.png", name: "三头慧之子" },
  eiki: { img: "立绘/四季映姬.png", name: "四季映姬" },
  satori: { img: "立绘/古明地觉.png", name: "古明地觉" },
  utsuho: { img: "立绘/灵乌路空.png", name: "灵乌路空" },
  patchouli: { img: "立绘/帕秋莉.png", name: "帕秋莉" },
  alice: { img: "立绘/爱丽丝.png", name: "爱丽丝" },
  kanako: { img: "立绘/八坂神奈子.png", name: "八坂神奈子" },
  eirin: { img: "立绘/八意永琳.png", name: "八意永琳" },
  yukari: { img: "立绘/八云紫.png", name: "八云紫" },
  ran: { img: "立绘/八云蓝.png", name: "八云蓝" },
  cirno: { img: "立绘/琪露诺.png", name: "琪露诺" },
  sakuya: { img: "立绘/十六夜咲夜.png", name: "十六夜咲夜" },
  iku: { img: "立绘/永江衣玖.png", name: "永江衣玖" },
  remilia: { img: "立绘/蕾米莉亚.png", name: "蕾米莉亚" },
  koishi:  { img:"立绘/古明地恋.png",  name:"古明地恋" }
};
function setBox(elId, char) {
  const box = document.getElementById(elId);
  const img = box.querySelector('img');
  const tip = box.querySelector('.name-tooltip');
  img.src = char.img;
  tip.innerText = char.name;
  box.style.display = 'block';
}

function hideBox(elId) {
  document.getElementById(elId).style.display = 'none';
}

function getByNum(n) {
  switch(n) {
    case 0: return chara.zero;
    case 1: return chara.ichirin;
    case 2: return chara.mamizo;
    case 3: return chara.keiko;
    case 4: return chara.eiki;
    case 5: return chara.satori;
    case 6: return chara.utsuho;
    case 7: return chara.patchouli;
    case 8: return chara.kanako;
    case 9: return chara.cirno;
    default: return chara.zero;
  }
}

function update() {
  const now = new Date();
  const hh = now.getHours();
  const mm = now.getMinutes();
  const h = String(hh).padStart(2, '0');
  const m = String(mm).padStart(2, '0');
  const H1 = +h[0], H2 = +h[1];
  const M1 = +m[0], M2 = +m[1];

  const clock = document.getElementById('clockNormal');
  const center = document.getElementById('centerChar');
  const colon = document.getElementById('colonBox');

  // 5:00 只显示蕾米莉亚
  if (hh === 5 && mm === 0) {
    clock.style.display = 'none';
    center.style.display = 'block';
    center.src = chara.remilia.img;
    return;
  }

  // 5:14 只显示古明地恋
  if (hh === 5 && mm === 14) {
    clock.style.display = 'none';
    center.style.display = 'block';
    center.src = chara.koishi.img;
    return;
  }

  clock.style.display = 'flex';
  center.style.display = 'none';
  colon.style.display = 'flex';

  // 先全部显示
  document.getElementById('box1').style.display = 'block';
  document.getElementById('box2').style.display = 'block';
  document.getElementById('box3').style.display = 'block';
  document.getElementById('box4').style.display = 'block';

  // ==================== 小时处理 ====================
  if (hh === 19) {
    setBox('box1', chara.iku);
    hideBox('box2');
  } else if (hh === 16) {
    setBox('box1', chara.sakuya);
    hideBox('box2');
  } else if (hh === 10) {
    setBox('box1', chara.rumia);
    hideBox('box2');
  } else {
    setBox('box1', getByNum(H1));
    setBox('box2', getByNum(H2));
  }

  // ==================== 分钟处理 ====================
  if (mm === 19) {
    setBox('box3', chara.iku);
    hideBox('box4');
  } else if (mm === 16) {
    setBox('box3', chara.sakuya);
    hideBox('box4');
  } else if (mm === 10) {
    setBox('box3', chara.rumia);
    hideBox('box4');
  } else {
    let c3 = getByNum(M1);
    let c4 = getByNum(M2);

    // 0 处理
    if (mm === 0) {
      c3 = chara.kosuzu;
      c4 = chara.kosuzu;
    } else {
      if (M1 === 0) c3 = chara.kosuzu;
      if (M2 === 0) c4 = chara.rumia;
    }

    // 7 右边变爱丽丝
    if (c3 === chara.patchouli) c3 = chara.alice;
    if (c4 === chara.patchouli) c4 = chara.alice;

    setBox('box3', c3);
    setBox('box4', c4);
  }
}

update();
setInterval(update, 1000);
</script>
</body>
</html>
