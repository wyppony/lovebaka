<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fumo盲盒拆拆乐</title>
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:"Microsoft YaHei", sans-serif;
    user-select:none;
}
body{
    background: #f5f5f5;
    min-height: 100vh;
    position: relative;
    padding: 20px;
}
/* 翻页按钮：置顶显示，无其他头栏 */
.page-btn {
    text-align: center;
    margin-bottom: 20px;
}
.page-btn button {
    background: #8D6E63;
    color: white;
    border: none;
    padding: 10px 25px;
    border-radius: 6px;
    cursor: pointer;
    margin: 0 10px;
    font-size: 16px;
}
.page-btn button.active {
    background: #5D4037;
}
/* 页面容器：抽盒机/收藏架 */
.page-container {
    display: none;
    width: 100%;
    max-width: 1200px;
    margin: 0 auto;
}
.page-container.active {
    display: block;
}
/* 抽盒机页面：强制两步点击，黄色抽取→深蓝色拆盒 */
.box-machine {
    background: white;
    padding: 40px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
    text-align: center;
    max-width: 600px;
    margin: 0 auto;
}
.machine-title {
    font-size: 28px;
    color: #5D4037;
    margin-bottom: 20px;
}
/* 抽取提示 */
.draw-tip {
    font-size: 18px;
    color: #333;
    margin-bottom: 15px;
}
/* 标红警告 */
.warn-tip {
    font-size: 16px;
    color: #ff0000;
    font-weight: bold;
    margin-bottom: 30px;
}
/* 按钮样式：黄色长方形抽取 → 深蓝色正方形拆盒 */
.draw-btn {
    width: 280px;
    height: 60px;
    background: #ffc107;
    color: #333;
    border: none;
    border-radius: 8px;
    font-size: 22px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.3s ease;
}
/* 拆盒按钮样式：深蓝色正方形 */
.open-btn {
    width: 120px;
    height: 120px;
    background: #1976d2;
    color: white;
    border: none;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    margin-bottom: 20px;
    transition: all 0.3s ease;
}
/* 禁用按钮样式：统一变灰 */
.draw-btn:disabled, .open-btn:disabled {
    background: #cccccc !important;
    color: #999999 !important;
    cursor: not-allowed !important;
}
.box-area {
    width: 300px;
    height: 300px;
    margin: 0 auto 20px;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}
.blind-box {
    width: 200px;
    height: 200px;
    background: linear-gradient(135deg, #ff9800, #f57c00);
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 20px;
    font-weight: bold;
    box-shadow: 0 8px 0 #e65100;
    display: none;
}
.blind-box.open {
    animation: openBox 1s ease forwards;
}
@keyframes openBox {
    0% { transform: scale(1); }
    50% { transform: scale(1.1) rotate(5deg); opacity: 0.8; }
    100% { transform: scale(0); opacity: 0; }
}
.fumo-show {
    position: absolute;
    width: 200px;
    height: 200px;
    object-fit: contain;
    display: none;
    animation: showFumo 0.5s ease forwards;
}
@keyframes showFumo {
    0% { transform: scale(0); }
    100% { transform: scale(1); }
}
/* 收藏架：棕色架子，Fumo卡片自适应换行（核心） */
.fumo-shelf {
    background: #8D6E63;
    padding: 30px;
    border-radius: 20px;
    box-shadow: 0 5px 15px rgba(0,0,0,0.2);
}
.shelf-title {
    color: white;
    font-size: 24px;
    margin-bottom: 20px;
    text-align: center;
}
/* 自适应网格：超过屏幕自动换行，适配所有设备 */
.shelf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
    gap: 20px;
}
.fumo-card {
    background: #fafafa;
    border-radius: 10px;
    padding: 15px;
    text-align: center;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
    cursor: pointer;
    transition: all 0.2s ease;
}
/* 点击压缩回弹动画 */
.fumo-card:active {
    transform: scale(0.95);
}
.fumo-img {
    width: 120px;
    height: 120px;
    object-fit: contain;
    margin-bottom: 10px;
}
.fumo-name {
    font-weight: bold;
    color: #333;
}
/* 信息侧栏：半透明，移除随机效果 */
.info-sidebar {
    position: fixed;
    top: 0;
    right: -400px;
    width: 400px;
    height: 100vh;
    background: rgba(255,255,255,0.95);
    box-shadow: -5px 0 15px rgba(0,0,0,0.2);
    padding: 30px;
    transition: right 0.3s ease;
    z-index: 100;
    overflow-y: auto;
}
.info-sidebar.show {
    right: 0;
}
.sidebar-close {
    position: absolute;
    top: 20px;
    right: 20px;
    width: 35px;
    height: 35px;
    border-radius: 50%;
    background: #ff4444;
    color: white;
    border: none;
    cursor: pointer;
    font-size: 18px;
}
.fumo-big-img {
    width: 200px;
    height: 200px;
    object-fit: contain;
    margin: 0 auto 20px;
    display: block;
}
.fumo-info h3 {
    font-size: 24px;
    color: #5D4037;
    margin-bottom: 10px;
}
.fumo-info p {
    color: #666;
    line-height: 1.6;
    margin-bottom: 15px;
    font-size: 18px;
}
/* 出售按钮：醒目样式 */
.sell-btn {
    background: #ff9800;
    color: white;
    border: none;
    padding: 12px 0;
    border-radius: 8px;
    font-size: 18px;
    font-weight: bold;
    cursor: pointer;
    width: 100%;
    margin-top: 20px;
}
/* 遮罩层 */
.mask {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.5);
    display: none;
    z-index: 90;
}
.mask.show {
    display: block;
}
/* 移动端适配 */
@media (max-width: 768px) {
    .info-sidebar {
        width: 100%;
    }
    .box-machine {
        padding: 20px;
    }
    .box-area {
        width: 250px;
        height: 250px;
    }
    .draw-btn {
        width: 220px;
        height: 50px;
        font-size: 18px;
    }
}
</style>

}

// 初始化收藏架
function renderShelf() {
    if (fumoData.list.length === 0) {
        shelfGrid.innerHTML = `
            <div class="fumo-card" style="opacity: 0.5; pointer-events: none;">
                <img src="funky.jpg" alt="空" class="fumo-img">
                <div class="fumo-name">暂无Fumo，快去抽取吧～</div>
            </div>
        `;
        return;
    }
    shelfGrid.innerHTML = '';
    fumoData.list.forEach((fumo, index) => {
        const card = document.createElement('div');
        card.className = 'fumo-card';
        card.innerHTML = `
            <img src="${fumo.img}" alt="${fumo.name}" class="fumo-img">
            <div class="fumo-name">${fumo.name}【${fumo.rarity}】</div>
        `;
        // 点击压缩回弹+音效+显示侧栏
        card.onclick = () => {
            audioClick.currentTime = 0;
            audioClick.play().catch(()=>{});
            currentFumoIndex = index;
            showFumoInfo(fumo);
        };
        shelfGrid.appendChild(card);
    });
}
renderShelf();

// 显示Fumo信息侧栏
function showFumoInfo(fumo) {
    fumoBigImg.src = fumo.img;
    fumoName.innerText = fumo.name;
    fumoRarity.innerText = fumo.rarity;
    fumoPrice.innerText = fumo.price;
    infoSidebar.classList.add('show');
    mask.classList.add('show');
}

// 关闭侧栏

    infoSidebar.classList.remove('show');
    mask.classList.remove('show');
    currentFumoIndex = -1;
}

// 第一步：点击抽取（仅正规入口可点击，点击后立即禁用，防止重复）
function startDraw() {
    if (isDrawn || isOpening || !entryValidity.isValid) return;
    
    // 标记为已抽取，禁用按钮（本次会话内不再启用）
    isDrawn = true;
    drawBtn.disabled = true;
    drawBtn.innerText = "正在抽取...";
    
    // 1-2秒延迟，切换按钮样式
    setTimeout(() => {
        // 切换为深蓝色正方形拆盒按钮（临时启用）
        drawBtn.className = 'open-btn';
        drawBtn.innerText = "点击拆盒";
        drawBtn.disabled = false;
        // 显示盲盒
        blindBox.style.display = 'flex';
        // 绑定拆盒事件
        drawBtn.onclick = startOpen;
        // 清除跳转标记（防止刷新后重复使用）
        localStorage.removeItem('fumoValidEntry');
        entryValidity.isValid = false;
    }, Math.floor(Math.random() * 1000) + 1000); // 1-2秒随机延迟
}

// 第二步：点击拆盒（播放动画+显示Fumo+加入收藏）
function startOpen() {
    if (!isDrawn || isOpening) return;
    isOpening = true;
    drawBtn.disabled = true; // 拆盒后再次禁用
    
    // 播放拆盒音效
    audioOpen.currentTime = 0;
    audioOpen.play().catch(()=>{});
    // 拆盒动画
    blindBox.classList.add('open');
    // 随机抽取Fumo
    const randomIndex = Math.floor(Math.random() * fumoLibrary.length);
    const randomFumo = fumoLibrary[randomIndex];
    // 1秒后显示Fumo
    setTimeout(() => {
        fumoShow.src = randomFumo.img;
        fumoShow.style.display = 'block';
        // 添加到收藏并保存
        fumoData.list.push(randomFumo);
        saveFumoData();
        // 2秒后提示
        setTimeout(() => {
            alert(`恭喜！抽到了【${randomFumo.rarity}】${randomFumo.name}！快去收藏架查看～`);
            // 重置状态
            isDrawn = false;
            isOpening = false;
            drawBtn.className = 'draw-btn';
            drawBtn.innerText = "抽取已完成";
            drawBtn.disabled = true;
            blindBox.classList.remove('open');
            fumoShow.style.display = 'none';
            blindBox.style.display = 'none';
            // 刷新收藏架
            renderShelf();
        }, 2000);
    }, 1000);
}

// 出售Fumo：强制跳转回旋转器+实时加点数
function sellFumo() {
    if (currentFumoIndex === -1 || currentFumoIndex >= fumoData.list.length) return;
    const sellFumo = fumoData.list[currentFumoIndex];
    // 增加点数并实时保存到旋转器
    gameData.count += sellFumo.price;
    saveGameData();
    // 播放出售音效
    audioSell.currentTime = 0;
    audioSell.play().catch(()=>{});
    // 移除Fumo并保存收藏
    fumoData.list.splice(currentFumoIndex, 1);
    saveFumoData();
    // 关闭侧栏+刷新收藏架
    closeSidebar();
    renderShelf();
    // 强制跳转回琪露诺旋转器2.html
    alert(`成功出售【${sellFumo.name}】，获得${sellFumo.price}点数！即将返回旋转器～`);
    window.location.href = '琪露诺旋转器2.html';
}

// 事件监听
// 翻页
page1Btn.onclick = () => {
    page1Btn.classList.add('active');
    page2Btn.classList.remove('active');
    page1.classList.add('active');
    page2.classList.remove('active');
    // 切换回抽盒机页面时，重新验证入口（防止刷新后绕过）
    initDrawBtn();
};
page2Btn.onclick = () => {
    page2Btn.classList.add('active');
    page1Btn.classList.remove('active');
    page2.classList.add('active');
    page1.classList.remove('active');
    renderShelf();
};
// 初始绑定抽取事件（仅正规入口启用后可点击）
drawBtn.onclick = startDraw;
// 关闭侧栏
sidebarClose.onclick = closeSidebar;
mask.onclick = closeSidebar;
// 出售Fumo
sellBtn.onclick = sellFumo;
// 保存数据，防止意外丢失
window.onbeforeunload = () => {
    saveFumoData();
    saveGameData();
};
</script>
</body>
</html>
