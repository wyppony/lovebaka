<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>琪露诺旋转器</title>
    <link rel="icon" href="9.ico" type="image/x-icon">  
    <link rel="icon" href="9-16x16.png" type="image/png" sizes="16x16">
    <link rel="icon" href="9-32x32.png" type="image/png" sizes="32x32">
<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,"Microsoft YaHei",sans-serif;
    user-select:none;
}
body{
    background:#fff;
    min-height:100vh;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:center;
    position:relative;
}
/* 计数器 */
.counter{
    position:absolute;
    top:20px;
    background:#fff;
    border:3px solid #4285f4;
    border-radius:10px;
    padding:10px 20px;
    font-size:24px;
    font-weight:bold;
    color:#4285f4;
    z-index:10;
}
/* 椭圆影子：紧贴琪露诺底部，3D效果 */
.shadow{
    width:220px;
    height:40px;
    background:#cccccc;
    border-radius:50%;
    position:absolute;
    bottom:10px;
    filter:blur(2px);
    opacity:0.8;
    z-index:4;
}
/* 琪露诺容器：用于定位本体和影子 */
.cirno-container{
    position:relative;
    width:260px;
    height:280px;
    display:flex;
    align-items:center;
    justify-content:center;
}
/* 琪露诺本体 */
#cirno{
    width:260px;
    height:260px;
    position:absolute;
    cursor:pointer;
    z-index:5;
    bottom: -30px;
}
#cirno.disabled{
    pointer-events:none;
}
/* 右侧菜单 */
.menu-btn{
    position:fixed;
    right:20px;
    top:50%;
    transform:translateY(-50%);
    width:50px;
    height:50px;
    border-radius:50%;
    background:#4285f4;
    color:white;
    font-size:24px;
    border:none;
    cursor:pointer;
    display:block;
    z-index:30;
}
.sidebar{
    position:fixed;
    right:-400px;
    top:0;
    width:400px;
    height:100vh;
    background:#f8f9fa;
    box-shadow:-5px 0 15px rgba(0,0,0,0.2);
    transition:right 0.3s ease;
    padding:20px;
    overflow-y:auto;
    z-index:100;
}
.sidebar.open{
    right:0;
}
/* 菜单头部：标题+关闭按钮 */
.sidebar-header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}
.sidebar h2{
    color:#4285f4;
    margin:0;
}
.close-menu{
    width:40px;
    height:40px;
    border-radius:50%;
    background:#4285f4;
    color:white;
    font-size:20px;
    border:none;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
}
/* 商品卡片 */
.item{
    background:white;
    border-radius:12px;
    padding:15px;
    margin-bottom:15px;
    box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
.item-img{
    width:100%;
    height:110px;
    object-fit:contain;
    background:#eee;
    border-radius:8px;
    margin-bottom:10px;
}
.item-name{
    font-size:18px;
    font-weight:bold;
    margin-bottom:5px;
}
.item-price{
    color:#f44336;
    font-weight:bold;
    margin-bottom:5px;
}
.item-desc{
    color:#666;
    font-size:14px;
    margin-bottom:10px;
}
.item button{
    width:100%;
    padding:10px;
    background:#4285f4;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
.item button:disabled{
    background:#ccc;
    cursor:not-allowed;
}
/* 数学题弹窗 */
.modal{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.5);
    display:none;
    align-items:center;
    justify-content:center;
    z-index:200;
}
.modal.show{
    display:flex;
}
.modal-box{
    background:white;
    padding:30px;
    border-radius:15px;
    text-align:center;
    min-width:300px;
}
.modal-box h3{
    color:#4285f4;
    margin-bottom:15px;
}
.modal-box p{
    font-size:20px;
    margin-bottom:15px;
}
.modal-box input{
    width:100%;
    padding:10px;
    font-size:18px;
    text-align:center;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
}
.modal-box button{
    padding:10px 20px;
    background:#4285f4;
    color:white;
    border:none;
    border-radius:8px;
    cursor:pointer;
}
</style>
</head>
<body>
<!-- 点击次数 -->
<div class="counter">点击次数：<span id="count">0</span></div>
<!-- 琪露诺容器：本体+椭圆影子 -->
<div class="cirno-container">
<img id="cirno" src="wps_doc_0.png" alt="琪露诺">
<div class="shadow"></div>
</div>
<!-- 菜单按钮 -->
<button class="menu-btn" id="openMenu">☰</button>
<!-- 右侧商店：添加关闭按钮 -->
<div class="sidebar" id="menu">
<div class="sidebar-header">
<h2>baka商店</h2>
<button class="close-menu" id="closeMenu">×</button>
</div>
<!-- 点击强化 -->
<div class="item">
<img class="item-img" src="末地烛.png">
<div class="item-name">点击强化</div>
<div class="item-price">价格：<span id="boostPrice">100</span> 点</div>
<div class="item-desc">每次点击 +5 点数，每次购买价格+50</div>
<button id="buyBoost">购买</button>
</div>
<!-- 大妖精 -->
<div class="item">
<img class="item-img" src="大妖精2.jpg">
<div class="item-name">大妖精</div>
<div class="item-price">价格：<span id="fairyPrice">150</span> 点</div>
<div class="item-desc">每秒自动+1点，可升级，每次升级价格+50</div>
<button id="buyFairy">购买/升级</button>
</div>
<!-- Funky模式：不再隐藏，直接显示 -->
<div class="item" id="funkyBox">
<img class="item-img" src="funky.jpg">
<div class="item-name">Funky</div>
<div class="item-price">价格：9 点</div>
<div class="item-desc">播放funky动画</div>
<button id="funkyBtn">启动 Funky</button>
</div>
<!-- 自定义商品1： -->
<div class="item">
<img class="item-img" src="强化.png">
<div class="item-name">点击加成</div>
<div class="item-price">价格：50 点</div>
<div class="item-desc">10秒内点击收益 ×2</div>
<button id="buy2x">购买</button>
</div>
<!-- 核心：Fumo盲盒抽取机会（单按钮购买并使用） -->
<div class="item">
<img class="item-img" src="盲盒券.jpg">
<div class="item-name">Fumo盲盒抽取机会</div>
<div class="item-price">价格：100 点/次</div>
<div class="item-desc">点击获得fumo抽取机会，5分钟内抽取有效！</div>
<button id="buyAndUseFumo">购买并使用</button>
</div>
</div>
<!-- 数学题弹窗 -->
<div class="modal" id="mathModal">
<div class="modal-box">
<h3>琪露诺的数学题！</h3>
<p id="question"></p>
<input type="text" id="ans" placeholder="输入正确答案，不会的写⑨">
<button id="submit">提交</button>
</div>
</div>
<audio id="baka" src="baka.mp3">
<audio id="funkySong" src="funky.mp3">
<script>
// 本地存储核心：实时保存点数，新增跳转标记
let gameData = JSON.parse(localStorage.getItem('cirnoGameData')) || {
    count: 0,
    perClick: 1,
    boostCost: 100,
    fairyLevel: 0,
    fairyCost: 150
};
// 实时保存数据
function saveData() {
    localStorage.setItem('cirnoGameData', JSON.stringify(gameData));
}
// 页面初始化+数据加载
let autoInterval = null;
let rotating = false;
let modalOpen = false;
const cirno = document.getElementById('cirno');
const countText = document.getElementById('count');
const frames = [
    "./wps_doc_1.png",
    "./wps_doc_2.png",
    "./wps_doc_3.png",
    "./wps_doc_4.png",
    "./wps_doc_5.png",
    "./wps_doc_6.png",
    "./wps_doc_7.png",
    "./wps_doc_8.png",
    "./wps_doc_9.png",
    "./wps_doc_10.png",
    "./wps_doc_11.png",
    "./wps_doc_12.png",
    "./wps_doc_13.png",
    "./wps_doc_14.png",
    "./wps_doc_0.png"
];
// 更新显示
function update() {
    countText.innerText = gameData.count;
    document.getElementById('boostPrice').innerText = gameData.boostCost;
    document.getElementById('fairyPrice').innerText = gameData.fairyCost;
}
// 初始化
function initPage() {
    update();
    // 大妖精自动点数+实时保存
    if (gameData.fairyLevel > 0) {
        autoInterval = setInterval(() => {
            if(!modalOpen){
                gameData.count += gameData.fairyLevel;
                update();
                saveData();
            }
        }, 1000);
    }
}
initPage();
// 旋转动画
function rotate(times = 1) {
    rotating = true;
    cirno.classList.add('disabled');
    let f = 0;
    let loop = 0;
    const rotateSpeed = 50; // 0.05秒/帧
    const itv = setInterval(() => {
        let img = new Image();
        img.src = frames[f];
        cirno.src = frames[f];
        f++;
        if (f >= frames.length) {
            f = 0;
            loop++;
            if (loop >= times) {
                clearInterval(itv);
                rotating = false;
                cirno.classList.remove('disabled');
                cirno.src = frames[frames.length - 1];
            }
        }
    }, rotateSpeed);
}
// 点击琪露诺+实时保存
cirno.addEventListener('click', () => {
    if (rotating || modalOpen) return;
    document.getElementById('baka').currentTime = 0;
    document.getElementById('baka').play().catch(()=>{});
    gameData.count += gameData.perClick;
    update();
    saveData();
    rotate();
});
// 菜单开关
document.getElementById('openMenu').onclick = () => document.getElementById('menu').classList.add('open');
document.getElementById('closeMenu').onclick = () => document.getElementById('menu').classList.remove('open');
// 购买点击强化+实时保存
document.getElementById('buyBoost').onclick = () => {
    if (gameData.count >= gameData.boostCost) {
        gameData.count -= gameData.boostCost;
        gameData.perClick += 5;
        gameData.boostCost += 50;
        update();
        saveData();
    }
};
// 购买大妖精+实时保存
document.getElementById('buyFairy').onclick = () => {
    if (gameData.count >= gameData.fairyCost) {
        gameData.count -= gameData.fairyCost;
        gameData.fairyLevel++;
        gameData.fairyCost += 50;
        update();
        saveData();
        if (autoInterval) clearInterval(autoInterval);
        autoInterval = setInterval(() => {
            if(!modalOpen){
                gameData.count += gameData.fairyLevel;
                update();
                saveData();
            }
        }, 1000);
    }
};
// Funky模式+实时保存
const modal = document.getElementById('mathModal');
const q = document.getElementById('question');
const ansIn = document.getElementById('ans');
let realAns = 0;
document.getElementById('funkyBtn').onclick = () => {
    if (gameData.count <9 || modalOpen) return;
    gameData.count -=9;
    update();
    saveData();
    modalOpen = true;
    modal.classList.add('show');
    const op = ['+','-','*','/'][Math.floor(Math.random()*4)];
    let a,b;
    do{
        a = Math.floor(Math.random()*9)+1;
        b = Math.floor(Math.random()*9)+1;
        if(op=='+') realAns = a+b;
        else if(op=='-'){ realAns = a-b; if(realAns<0) continue; }
        else if(op=='*') realAns = a*b;
        else { if(a%b!==0) continue; realAns = a/b; }
    }while(realAns >=10);
    q.innerText = `${a} ${op} ${b} = ?`;
};
document.getElementById('submit').onclick = () => {
    const v = ansIn.value.trim();
    if(v == realAns || v == "⑨"){
        modal.classList.remove('show');
        modalOpen = false;
        document.getElementById('funkySong').currentTime=0;
        document.getElementById('funkySong').play().catch(()=>{});
        rotate(5);
    }else{
        alert("答错啦~bakabakabaka!");
    }
    ansIn.value = "";
};
// 点击加成+实时保存
document.getElementById('buy2x').onclick = () => {
    if(gameData.count >=50){
        gameData.count -=50;
        update();
        saveData();
        const old = gameData.perClick;
        gameData.perClick *=2;
        setTimeout(()=> gameData.perClick=old, 10000);
    }
};
// 核心优化：购买并使用（添加跳转标记，仅此时拆盒乐可抽取）
document.getElementById('buyAndUseFumo').onclick = () => {
    if (gameData.count >= 100) {
        // 1. 扣除点数并保存
        gameData.count -= 100;
        update();
        saveData();
        // 2. 设置跳转标记：标记为"从旋转器正规入口进入"，有效期5分钟（防止长期有效）
        localStorage.setItem('fumoValidEntry', JSON.stringify({
            isValid: true,
            expireTime: Date.now() + 5 * 60 * 1000 // 5分钟后失效
        }));
        // 3. 强制跳转拆盒乐
        window.open('fumo拆拆乐.html', '_blank');
        alert("已扣除100点数");
    } else {
        alert("点数不足baka，需要100点数解锁一次Fumo抽取机会！");
    }
};
// 窗口关闭/刷新也保存，杜绝数据丢失
window.onbeforeunload = saveData;
</script>
</body>
</html>
